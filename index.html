<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
    color: white;
}

/* NAVBAR */
.nav {
    background: rgba(0,0,0,0.8);
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.nav h2 {
    margin: 0;
}

.nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* MAIN */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
    text-align: center;
}

.search-box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    width: 320px;
    margin: 20px auto;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background-color: #00bcd4;
    color: white;
    cursor: pointer;
}

.results {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* CARDS */
.card {
    background: white;
    color: black;
    width: 250px;
    margin: 10px;
    border-radius: 12px;
    overflow: hidden;
    text-align: left;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.features {
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <h2>🌍 Travel App</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Search</a>
        <a href="#">About</a>
    </div>
</div>

<div class="overlay">

<h1>Find Your Next Trip</h1>
<p>Search flights, hotels, and trains all in one place</p>

<!-- SEARCH BOX -->
<div class="search-box">
    <input type="text" id="destination" placeholder="Enter city">

    <select id="country">
        <option value="france">France</option>
        <option value="usa">USA</option>
        <option value="japan">Japan</option>
    </select>

    <select id="type">
        <option value="flights">Flights</option>
        <option value="hotels">Hotels</option>
        <option value="trains">Trains</option>
    </select>

    <button class="btn" onclick="search()">Search</button>
</div>

<!-- RESULTS -->
<div id="results" class="results"></div>

<p><i>*Demo results for project purposes*</i></p>

<!-- FUTURE -->
<div class="features">
    <h3>Future Expansion</h3>
    <p>🌍 Country-based systems</p>
    <p>🚆 Train tracking</p>
    <p>✈️ Flight APIs</p>
    <p>🏨 Hotel integration</p>
</div>

</div>

<script>
function search() {
    let destination = document.getElementById("destination").value || "Popular Destination";
    let country = document.getElementById("country").value;
    let type = document.getElementById("type").value;

    let results = "";

    if (type === "flights") {
        results += createCard("✈️ Flight", destination, "$300 - $800",
        "https://images.unsplash.com/photo-1502920917128-1aa500764cbd");

        results += createCard("✈️ Flight Deal", destination, "$250 Limited Offer",
        "https://images.unsplash.com/photo-1494415859740-21e878dd929d");
    }

    if (type === "hotels") {
        results += createCard("🏨 Hotel Stay", destination, "$120 / night",
        "https://images.unsplash.com/photo-1566073771259-6a8506099945");

        results += createCard("🏨 Luxury Hotel", destination, "$220 / night",
        "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b");
    }

    if (type === "trains") {
        results += createCard("🚆 Train Ticket", country.toUpperCase(), "$60",
        "https://images.unsplash.com/photo-1474487548417-781cb71495f3");

        results += createCard("🚆 Express Train", country.toUpperCase(), "$90",
        "https://images.unsplash.com/photo-1501594907352-04cda38ebc29");
    }

    document.getElementById("results").innerHTML = results;
}

function createCard(title, location, price, image) {
    return `
        <div class="card">
            <img src="${image}">
            <div class="card-content">
                <h4>${title}</h4>
                <p><strong>${location}</strong></p>
                <p>${price}</p>
            </div>
        </div>
    `;
}
</script>

</body>
</html>

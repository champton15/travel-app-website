<script>
async function search() {
    const destination = document.getElementById("destination").value.trim();
    const resultsDiv = document.getElementById("results");

    // Validate input
    if (!destination) {
        alert("Please enter a destination");
        return;
    }

    // Show loading state (makes it feel real)
    resultsDiv.innerHTML = "<p style='color:white;'>Searching real hotels...</p>";

    const apiKey = "b071fca2216e4d3bb2cbea11fad11019";

    // FIX: encode user input to prevent API errors
    const url = `https://api.geoapify.com/v2/places?categories=accommodation.hotel&text=${encodeURIComponent(destination)}&limit=6&apiKey=${apiKey}`;

    try {
        const response = await fetch(url);

        // Handle bad API response
        if (!response.ok) {
            throw new Error("API request failed");
        }

        const data = await response.json();
        console.log("API DATA:", data);

        let results = "";

        // Handle empty or missing results safely
        if (!data.features || data.features.length === 0) {
            resultsDiv.innerHTML = "<p style='color:white;'>No hotels found. Try a major city like Paris or New York.</p>";
            return;
        }

        // Build result cards
        data.features.forEach(place => {
            const props = place.properties;

            const name = props.name || "Hotel";
            const address = props.formatted || "Address not available";

            results += `
                <div class="card">
                    <div class="card-content">
                        <h4>${name}</h4>
                        <p>${address}</p>
                        <button class="btn" onclick="alert('Redirecting to booking partner...')">
                            Book Now
                        </button>
                    </div>
                </div>
            `;
        });

        resultsDiv.innerHTML = results;

    } catch (error) {
        console.error(error);
        resultsDiv.innerHTML = "<p style='color:red;'>Error loading travel data. Please try again.</p>";
    }
}
</script>

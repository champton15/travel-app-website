<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
    color: white;
}

/* NAVBAR */
.nav {
    background: rgba(0,0,0,0.8);
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.nav h2 {
    margin: 0;
}

.nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* MAIN */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
    text-align: center;
}

.search-box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    width: 320px;
    margin: 20px auto;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background-color: #00bcd4;
    color: white;
    cursor: pointer;
}

.results {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* CARDS */
.card {
    background: white;
    color: black;
    width: 250px;
    margin: 10px;
    border-radius: 12px;
    overflow: hidden;
    text-align: left;
}

.card-content {
    padding: 10px;
}

.features {
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <h2>🌍 Travel App</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Search</a>
        <a href="#">About</a>
    </div>
</div>

<div class="overlay">

<h1>Find Your Next Trip</h1>
<p>Search real hotels using live data</p>

<!-- SEARCH BOX -->
<div class="search-box">
    <input type="text" id="destination" placeholder="Enter city">

    <button class="btn" onclick="search()">Search</button>
</div>

<!-- RESULTS -->
<div id="results" class="results"></div>

<p><i>*Live hotel data powered by API*</i></p>

<!-- FUTURE -->
<div class="features">
    <h3>Future Expansion</h3>
    <p>🌍 Country-based systems</p>
    <p>🚆 Train tracking</p>
    <p>✈️ Flight APIs</p>
    <p>🏨 Hotel integration</p>
</div>

</div>

<script>
async function search() {
    let destination = document.getElementById("destination").value;

    if (!destination) {
        alert("Please enter a destination");
        return;
    }

    let apiKey = "b071fca2216e4d3bb2cbea11fad11019";

    let url = `https://api.geoapify.com/v2/places?categories=accommodation.hotel&text=${destination}&limit=6&apiKey=${apiKey}`;

    try {
        let response = await fetch(url);
        let data = await response.json();

        let results = "";

        if (data.features.length === 0) {
            results = "<p>No hotels found. Try another location.</p>";
        } else {
            data.features.forEach(place => {
                let name = place.properties.name || "Hotel";
                let address = place.properties.formatted || "Address not available";

                results += `
                    <div class="card">
                        <div class="card-content">
                            <h4>${name}</h4>
                            <p>${address}</p>
                            <button class="btn">Book Now</button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById("results").innerHTML = results;

    } catch (error) {
        console.error(error);
        document.getElementById("results").innerHTML = "<p>Error loading data.</p>";
    }
}
</script>

</body>
</html>

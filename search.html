<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: black;
}

.nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

.container {
    padding: 30px;
    text-align: center;
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: none;
}

.btn {
    padding: 10px 15px;
    background: #00bcd4;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    margin-left: 10px;
}

.results {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
}

.card {
    background: white;
    color: black;
    width: 250px;
    margin: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.card-content {
    padding: 10px;
}
</style>
</head>

<body>

<div class="nav">
    <h2>Search Hotels</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="search.html">Search</a>
        <a href="about.html">About</a>
    </div>
</div>

<div class="container">

    <h1>Find Real Hotels</h1>

    <input type="text" id="destination" placeholder="Enter city">
    <button class="btn" onclick="search()">Search</button>

    <div id="results" class="results"></div>

</div>

<script>
async function search() {
    const destination = document.getElementById("destination").value.trim();
    const resultsDiv = document.getElementById("results");

    if (!destination) {
        alert("Enter a city");
        return;
    }

    resultsDiv.innerHTML = "<p>Loading...</p>";

    const apiKey = "b071fca2216e4d3bb2cbea11fad11019";

    try {
        const geoUrl = `https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(destination)}&apiKey=${apiKey}`;

        const geoRes = await fetch(geoUrl);
        const geoData = await geoRes.json();

        const { lat, lon } = geoData.features[0].properties;

        const hotelUrl = `https://api.geoapify.com/v2/places?categories=accommodation.hotel&filter=circle:${lon},${lat},5000&limit=6&apiKey=${apiKey}`;

        const hotelRes = await fetch(hotelUrl);
        const hotelData = await hotelRes.json();

        let html = "";

        hotelData.features.forEach(place => {
            html += `
                <div class="card">
                    <div class="card-content">
                        <h3>${place.properties.name || "Hotel"}</h3>
                        <p>${place.properties.formatted || ""}</p>
                        <button class="btn">Book Now</button>
                    </div>
                </div>
            `;
        });

        resultsDiv.innerHTML = html;

    } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "<p>Error loading data</p>";
    }
}
</script>

</body>
</html>

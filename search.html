<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Hub Elite</title>

<link rel="stylesheet" href="styles.css">
<script type="module" src="app.js"></script>
</head>

<body>

<div class="nav">
    <div><strong>🌍 Travel Hub</strong></div>
    <div>
        <a href="index.html">Home</a>
        <a href="search.html">App</a>
        <a href="about.html">About</a>
    </div>
</div>

<div class="hero">
    <h1>Find your next trip</h1>

    <input type="text" id="destination" placeholder="Enter city">
    <button class="btn" onclick="search()">Search</button>

    <div style="margin-top:15px;">
        <button class="btn" onclick="setMode('hotels')">🏨 Hotels</button>
        <button class="btn" onclick="setMode('hostels')">🛏️ Hostels</button>
        <button class="btn" onclick="setMode('flights')">✈️ Flights</button>
        <button class="btn" onclick="setMode('trains')">🚆 Trains</button>
    </div>
</div>

<div style="text-align:center;">
    <h2>Explore Global Travel Options</h2>
    <p style="opacity:0.7;">Real API + simulated global transport</p>
</div>

<div id="results" class="results"></div>

<div style="text-align:center; padding:20px;">
    <button class="btn" onclick="showTrips()">View Saved Trips ⭐</button>
    <div id="tripList"></div>
</div>

</body>
</html>

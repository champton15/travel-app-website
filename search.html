<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Hub</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<div class="nav">

    <div class="logo">
        <a href="index.html">🌍 Travel Hub</a>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="search.html">Search</a>
        <a href="saved.html">Trips</a>
        <a href="profile.html">Profile</a>
    </div>

</div>

<!-- HERO -->
<div class="hero">
    <h1>Where to next?</h1>

    <input id="destination" placeholder="Search cities...">
    <button class="btn" onclick="search()">Search</button>

    <div style="margin-top:15px;">
        <button class="btn" onclick="setMode('accommodation.hotel')">Hotels</button>
        <button class="btn" onclick="setMode('accommodation.hostel')">Hostels</button>
        <button class="btn" onclick="setMode('transport.airport')">Flights</button>
        <button class="btn" onclick="setMode('transport.train_station')">Trains</button>
    </div>
</div>

<!-- RESULTS -->
<div id="results" class="results"></div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg">
        <h2 id="modalTitle"></h2>
        <p id="modalAddress"></p>
        <div id="modalPrice" class="price"></div>

        <button class="btn" onclick="saveFromModal()">
            ⭐ Save Trip
        </button>
    </div>
</div>

<!-- ✅ CORRECT SCRIPT PATHS -->
<script src="services/apis/geoapify.js"></script>
<script src="app.js"></script>

</body>
</html>

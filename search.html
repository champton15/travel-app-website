<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.85);
}

.nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 20px 10px;
}

.hero h1 {
    font-size: 2.5em;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 10px;
    border: none;
}

.btn {
    padding: 12px 16px;
    background: #00bcd4;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    margin-left: 5px;
}

/* TABS */
.tabs {
    text-align: center;
    margin-top: 15px;
}

/* RESULTS */
.results {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
    padding: 25px;
}

/* CARD */
.card {
    background: #111b2e;
    border-radius: 16px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.card-content {
    padding: 12px;
}

.price {
    color: #00e5a8;
    font-weight: bold;
    margin-top: 6px;
}

.small-btn {
    margin-top: 10px;
    padding: 8px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #1e90ff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div><strong>🌍 Travel Hub</strong></div>
    <div>
        <a href="index.html">Home</a>
        <a href="search.html">App</a>
        <a href="about.html">About</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Find your next trip</h1>

    <input type="text" id="destination" placeholder="Enter city (Paris, Tokyo)">
    <button class="btn" onclick="search()">Search</button>

    <!-- TABS -->
    <div class="tabs">
        <button class="btn" onclick="setMode('hotels')">🏨 Hotels</button>
        <button class="btn" onclick="setMode('hostels')">🛏️ Hostels</button>
        <button class="btn" onclick="setMode('flights')">✈️ Flights</button>
        <button class="btn" onclick="setMode('trains')">🚆 Trains</button>
    </div>
</div>

<!-- RESULTS -->
<div id="results" class="results"></div>

<script>

let mode = "hotels";
let apiKey = "b071fca2216e4d3bb2cbea11fad11019";

function setMode(m) {
    mode = m;
}

async function search() {

    const destination = document.getElementById("destination").value.trim();
    const resultsDiv = document.getElementById("results");

    if (!destination) {
        resultsDiv.innerHTML = "<p style='text-align:center;'>Enter a city</p>";
        return;
    }

    resultsDiv.innerHTML = "<p style='text-align:center;'>🔎 Searching...</p>";

    try {

        // STEP 1: GEO LOCATION
        const geoRes = await fetch(
            `https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(destination)}&lang=en&apiKey=${apiKey}`
        );

        const geoData = await geoRes.json();

        if (!geoData.features.length) {
            resultsDiv.innerHTML = "<p style='text-align:center;'>Location not found</p>";
            return;
        }

        const { lat, lon } = geoData.features[0].properties;

        // -----------------------------
        // ✈️ FLIGHTS (SIMULATED)
        // -----------------------------
        if (mode === "flights") {

            let airlines = ["Delta", "United", "Emirates", "Lufthansa", "Air France"];
            let html = "";

            for (let i = 0; i < 6; i++) {

                let price = Math.floor(Math.random() * 700) + 200;

                html += `
                <div class="card">
                    <img src="https://source.unsplash.com/400x300/?airplane,sky">
                    <div class="card-content">
                        <h3>${airlines[Math.floor(Math.random()*airlines.length)]}</h3>
                        <p>${destination} Flight Route</p>
                        <div class="price">$${price}</div>
                        <button class="small-btn">View Flight</button>
                    </div>
                </div>`;
            }

            resultsDiv.innerHTML = html;
            return;
        }

        // -----------------------------
        // 🚆 TRAINS (SIMULATED)
        // -----------------------------
        if (mode === "trains") {

            let trains = ["EuroRail", "Amtrak", "Shinkansen", "ICE Germany", "Renfe"];
            let html = "";

            for (let i = 0; i < 6; i++) {

                let price = Math.floor(Math.random() * 120) + 40;

                html += `
                <div class="card">
                    <img src="https://source.unsplash.com/400x300/?train,railway">
                    <div class="card-content">
                        <h3>${trains[Math.floor(Math.random()*trains.length)]}</h3>
                        <p>${destination} Route</p>
                        <div class="price">$${price}</div>
                        <button class="small-btn">View Route</button>
                    </div>
                </div>`;
            }

            resultsDiv.innerHTML = html;
            return;
        }

        // -----------------------------
        // 🏨 HOTELS / 🛏️ HOSTELS (REAL API)
        // -----------------------------

        let category =
            mode === "hostels"
            ? "accommodation.hostel"
            : "accommodation.hotel";

        const placeRes = await fetch(
            `https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lon},${lat},5000&limit=8&lang=en&apiKey=${apiKey}`
        );

        const placeData = await placeRes.json();

        if (!placeData.features.length) {
            resultsDiv.innerHTML = "<p style='text-align:center;'>No results found</p>";
            return;
        }

        let html = "";

        placeData.features.forEach(place => {

            const name = place.properties.name || "Stay";
            const address = place.properties.formatted || "Address unavailable";
            const price = Math.floor(Math.random() * 180) + 60;

            html += `
            <div class="card">
                <img src="https://source.unsplash.com/400x300/?hotel,room">
                <div class="card-content">
                    <h3>${name}</h3>
                    <p>${address}</p>
                    <div class="price">$${price} / night</div>
                    <button class="small-btn">View Details</button>
                </div>
            </div>`;
        });

        resultsDiv.innerHTML = html;

    } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "<p style='text-align:center;'>Error loading data</p>";
    }
}

</script>

</body>
</html>
